<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Patchone</title>
<style>
  * { box-sizing: border-box; font-family: Arial, sans-serif; }
  body { margin: 0; background: #1e1e2f; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; }
  .hidden { display: none !important; }
  .card { background: #2a2a40; padding: 30px; border-radius: 10px; width: 320px; }
  input { width: 100%; padding: 8px; margin: 6px 0; border-radius: 5px; border: 1px solid #555; background: #1e1e2f; color: #eee; }
  button { width: 100%; padding: 10px; margin: 6px 0; border: none; border-radius: 5px; background: #4a4ae0; color: white; cursor: pointer; }
  button:hover { background: #6363ff; }
  #lobby { display: none; width: 700px; height: 500px; background: #2a2a40; border-radius: 10px; overflow: hidden; }
  #lobby.active { display: flex; }
  .panel { flex: 1; padding: 15px; display: flex; flex-direction: column; }
  #groupsPanel { border-right: 1px solid #444; max-width: 220px; }
  #groupList { flex: 1; overflow-y: auto; margin-bottom: 10px; }
  .group-item { padding: 6px; background: #1e1e2f; margin: 4px 0; border-radius: 5px; cursor: pointer; }
  .group-item:hover { background: #3a3a55; }
  .group-item.active { background: #4a4ae0; }
  #chatHeader { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  #chatHeader h2 { flex: 1; font-size: 16px; }
  #membersLine { font-size: 12px; color: #999; margin-bottom: 8px; }
  #chatMessages { flex: 1; overflow-y: auto; background: #1e1e2f; border-radius: 5px; padding: 10px; margin-bottom: 10px; }
  .message { margin: 6px 0; }
  .message b { color: #8a8aff; }
  .message .time { color: #777; font-size: 11px; margin-left: 6px; }
  #messageForm { display: flex; gap: 5px; }
  #messageInput { flex: 1; border: 2px solid #4a4ae0; }
  #messageForm button { width: auto; padding: 8px 16px; }
  h2 { margin-top: 0; text-align: center; }
  #addMemberRow { display: flex; gap: 5px; margin-bottom: 8px; }
  #addMemberRow input { margin: 0; }
  #addMemberRow button { width: auto; padding: 8px 12px; margin: 0; }
  #topBar { display: flex; justify-content: space-between; align-items: center; }
  #topBar button { width: auto; padding: 6px 10px; margin: 0; background: #3a3a55; font-size: 12px; }
  #logoutBtn:hover { background: #4a4a70; }

  /* Modal */
  .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 10; }
  .overlay.active { display: flex; }
  .modal { background: #2a2a40; padding: 20px; border-radius: 10px; width: 300px; max-height: 80vh; display: flex; flex-direction: column; }
  #userCheckList { flex: 1; overflow-y: auto; max-height: 200px; margin: 10px 0; background: #1e1e2f; border-radius: 5px; padding: 8px; }
  .user-check-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .user-check-item input { width: auto; margin: 0; }
  .modal-buttons { display: flex; gap: 8px; }
  .modal-buttons button { width: auto; flex: 1; }
  #modalError { color: #ff8080; font-size: 13px; text-align: center; min-height: 18px; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="card" id="authScreen">
  <h2>Patchone</h2>
  <form id="authForm">
    <input type="text" id="nickInput" placeholder="Nickname" autocomplete="off">
    <input type="password" id="passInput" placeholder="Password" autocomplete="off">
    <button type="submit" id="loginBtn">Login</button>
    <button type="button" id="registerBtn">Register</button>
  </form>
  <p id="authMessage" style="color:#ff8080; text-align:center;"></p>
</div>

<!-- LOBBY -->
<div id="lobby">
  <div class="panel" id="groupsPanel">
    <div id="topBar">
      <h2>Groups</h2>
      <button type="button" id="logoutBtn">Log out</button>
    </div>
    <div id="groupList"></div>
    <button type="button" id="createGroupBtn">Create Group</button>
  </div>
  <div class="panel" id="chatPanel">
    <div id="chatHeader">
      <h2 id="currentGroupTitle">No group selected</h2>
    </div>
    <div id="membersLine"></div>
    <div id="addMemberRow" class="hidden">
      <input type="text" id="addMemberInput" placeholder="Add member by nickname" autocomplete="off">
      <button type="button" id="addMemberBtn">Add</button>
    </div>
    <div id="chatMessages"></div>
    <form id="messageForm">
      <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
      <button type="submit">Send</button>
    </form>
  </div>
</div>

<!-- CREATE GROUP MODAL -->
<div class="overlay" id="createGroupOverlay">
  <div class="modal">
    <h2>New Group</h2>
    <input type="text" id="newGroupName" placeholder="Group name" autocomplete="off">
    <div id="userCheckList"></div>
    <p id="modalError"></p>
    <div class="modal-buttons">
      <button type="button" id="confirmCreateGroupBtn">Create</button>
      <button type="button" id="cancelCreateGroupBtn">Cancel</button>
    </div>
  </div>
</div>

<script>
  let currentUser = null;
  let currentGroup = null; // full group object from the server
  let pollTimer = null;

  const authScreen = document.getElementById('authScreen');
  const lobby = document.getElementById('lobby');
  const authForm = document.getElementById('authForm');
  const authMessage = document.getElementById('authMessage');
  const nickInput = document.getElementById('nickInput');
  const passInput = document.getElementById('passInput');
  const registerBtn = document.getElementById('registerBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const groupList = document.getElementById('groupList');
  const chatMessages = document.getElementById('chatMessages');
  const currentGroupTitle = document.getElementById('currentGroupTitle');
  const membersLine = document.getElementById('membersLine');
  const messageForm = document.getElementById('messageForm');
  const messageInput = document.getElementById('messageInput');
  const addMemberRow = document.getElementById('addMemberRow');
  const addMemberInput = document.getElementById('addMemberInput');
  const addMemberBtn = document.getElementById('addMemberBtn');

  const createGroupOverlay = document.getElementById('createGroupOverlay');
  const newGroupName = document.getElementById('newGroupName');
  const userCheckList = document.getElementById('userCheckList');
  const modalError = document.getElementById('modalError');
  const confirmCreateGroupBtn = document.getElementById('confirmCreateGroupBtn');
  const cancelCreateGroupBtn = document.getElementById('cancelCreateGroupBtn');

  // ---- Small fetch helper ----
  async function api(path, options = {}) {
    const res = await fetch(path, {
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      ...options,
    });
    let data = {};
    try { data = await res.json(); } catch (e) { /* no body */ }
    if (!res.ok) {
      throw new Error(data.error || 'Something went wrong.');
    }
    return data;
  }

  function showAuthMessage(text) {
    authMessage.textContent = text;
  }

  function getCredentials() {
    return {
      username: nickInput.value.trim(),
      password: passInput.value,
    };
  }

  function formatTime(isoString) {
    const d = new Date(isoString + 'Z');
    if (isNaN(d.getTime())) return '';
    return d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  // ---- Auth ----
  registerBtn.addEventListener('click', async () => {
    const { username, password } = getCredentials();
    if (!username || !password) {
      showAuthMessage('Enter a nickname and password.');
      return;
    }
    try {
      const data = await api('/api/register', {
        method: 'POST',
        body: JSON.stringify({ username, password }),
      });
      showAuthMessage(data.message || 'Registered successfully. You can log in now.');
    } catch (err) {
      showAuthMessage(err.message);
    }
  });

  authForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const { username, password } = getCredentials();
    if (!username || !password) {
      showAuthMessage('Enter a nickname and password.');
      return;
    }
    try {
      const data = await api('/api/login', {
        method: 'POST',
        body: JSON.stringify({ username, password }),
      });
      currentUser = data.username;
      enterLobby();
    } catch (err) {
      showAuthMessage(err.message);
    }
  });

  logoutBtn.addEventListener('click', async () => {
    try { await api('/api/logout', { method: 'POST' }); } catch (e) { /* ignore */ }
    stopPolling();
    currentUser = null;
    currentGroup = null;
    lobby.classList.remove('active');
    authScreen.classList.remove('hidden');
    nickInput.value = '';
    passInput.value = '';
    showAuthMessage('');
  });

  async function enterLobby() {
    authScreen.classList.add('hidden');
    lobby.classList.add('active');
    await refreshGroupList();
  }

  // Restore session on page load/refresh instead of forcing a fresh login.
  async function checkExistingSession() {
    try {
      const data = await api('/api/me');
      if (data.logged_in) {
        currentUser = data.username;
        await enterLobby();
      }
    } catch (err) { /* not logged in, stay on auth screen */ }
  }

  // ---- Groups ----
  async function refreshGroupList() {
    const data = await api('/api/groups');
    renderGroupList(data.groups);
    // Keep the open group's info (like member list) fresh too.
    if (currentGroup) {
      const updated = data.groups.find(g => g.id === currentGroup.id);
      if (updated) selectGroup(updated, false);
    }
  }

  function renderGroupList(groups) {
    groupList.innerHTML = '';
    groups.forEach(group => {
      const div = document.createElement('div');
      div.className = 'group-item' + (currentGroup && currentGroup.id === group.id ? ' active' : '');
      div.textContent = group.name;
      div.addEventListener('click', () => selectGroup(group));
      groupList.appendChild(div);
    });
  }

  function selectGroup(group, doFetchMessages = true) {
    currentGroup = group;
    currentGroupTitle.textContent = group.name;
    membersLine.textContent = 'Owner: ' + group.owner + ' · Members: ' + group.members.join(', ');
    addMemberRow.classList.toggle('hidden', group.owner !== currentUser);
    Array.from(groupList.children).forEach((el, i) => {
      el.classList.toggle('active', el.textContent === group.name);
    });
    if (doFetchMessages) {
      loadMessages();
      startPolling();
    }
  }

  // ---- Create Group Modal ----
  document.getElementById('createGroupBtn').addEventListener('click', async () => {
    newGroupName.value = '';
    modalError.textContent = '';
    await renderUserCheckList();
    createGroupOverlay.classList.add('active');
  });

  cancelCreateGroupBtn.addEventListener('click', () => {
    createGroupOverlay.classList.remove('active');
  });

  async function renderUserCheckList() {
    userCheckList.innerHTML = 'Loading…';
    try {
      const data = await api('/api/users');
      userCheckList.innerHTML = '';
      if (!data.users.length) {
        userCheckList.innerHTML = '<p style="text-align:center; color:#888;">No other registered users yet.</p>';
        return;
      }
      data.users.forEach(u => {
        const div = document.createElement('div');
        div.className = 'user-check-item';
        const checkboxId = 'chk-' + u;
        div.innerHTML = `<input type="checkbox" id="${checkboxId}" value="${u}"><label for="${checkboxId}">${u}</label>`;
        userCheckList.appendChild(div);
      });
    } catch (err) {
      userCheckList.innerHTML = '';
      modalError.textContent = err.message;
    }
  }

  confirmCreateGroupBtn.addEventListener('click', async () => {
    const name = newGroupName.value.trim();
    if (!name) {
      modalError.textContent = 'Enter a group name.';
      return;
    }
    const checked = Array.from(userCheckList.querySelectorAll('input[type="checkbox"]:checked'))
      .map(cb => cb.value);
    try {
      const data = await api('/api/groups', {
        method: 'POST',
        body: JSON.stringify({ name, members: checked }),
      });
      createGroupOverlay.classList.remove('active');
      await refreshGroupList();
      selectGroup(data.group);
    } catch (err) {
      modalError.textContent = err.message;
    }
  });

  // ---- Add member (owner only) ----
  addMemberBtn.addEventListener('click', async () => {
    const username = addMemberInput.value.trim();
    if (!username || !currentGroup) return;
    try {
      const data = await api(`/api/groups/${currentGroup.id}/members`, {
        method: 'POST',
        body: JSON.stringify({ username }),
      });
      addMemberInput.value = '';
      await refreshGroupList();
      selectGroup(data.group, false);
    } catch (err) {
      alert(err.message);
    }
  });

  // ---- Chat ----
  async function loadMessages() {
    if (!currentGroup) return;
    try {
      const data = await api(`/api/groups/${currentGroup.id}/messages`);
      renderMessages(data.messages);
    } catch (err) {
      console.error(err);
    }
  }

  function renderMessages(messages) {
    chatMessages.innerHTML = '';
    messages.forEach(msg => {
      const div = document.createElement('div');
      div.className = 'message';
      const b = document.createElement('b');
      b.textContent = msg.username;
      const span = document.createElement('span');
      span.textContent = ' : ' + msg.text;
      const time = document.createElement('span');
      time.className = 'time';
      time.textContent = formatTime(msg.time);
      div.appendChild(b);
      div.appendChild(span);
      div.appendChild(time);
      chatMessages.appendChild(div);
    });
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  messageForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = messageInput.value.trim();
    if (!text || !currentGroup || !currentUser) return;
    messageInput.value = '';
    try {
      await api(`/api/groups/${currentGroup.id}/messages`, {
        method: 'POST',
        body: JSON.stringify({ text }),
      });
      await loadMessages();
    } catch (err) {
      alert(err.message);
    }
  });

  // Poll for new messages/members every few seconds so a group chat updates
  // without requiring a manual refresh.
  function startPolling() {
    stopPolling();
    pollTimer = setInterval(() => {
      loadMessages();
    }, 3000);
  }

  function stopPolling() {
    if (pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
  }

  checkExistingSession();
</script>

</body>
</html>
